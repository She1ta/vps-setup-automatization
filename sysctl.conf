# ==============================================================================
# MODERN SYSCTL.CONF FOR UBUNTU 22.04 / 24.04
# Optimized for Performance, Security, and BBR Congestion Control
# ==============================================================================
#
# Ensure the BBR module is loaded:
# If you reboot, the kernel needs to know to load BBR. Run this command once so it survives reboots:
# echo "tcp_bbr" | sudo tee /etc/modules-load.d/tcp_bbr.conf
# sudo modprobe tcp_bbr
#
#
# sudo sysctl -p
#
# Verify BBR is running:
# sysctl net.ipv4.tcp_congestion_control
# It should output net.ipv4.tcp_congestion_control = bbr
#
#
# ------------------------------------------------------------------------------
# 1. VIRTUAL MEMORY & SWAP TUNING
# ------------------------------------------------------------------------------
# Prevent premature swapping (Keep apps in RAM, use swap only in emergencies)
vm.swappiness = 10
# Prefer keeping directory/inode cache in RAM over page cache
vm.vfs_cache_pressure = 50
# Allow kernel to overcommit memory intelligently
vm.overcommit_memory = 0
# Start writing dirty data to disk at 5% RAM usage, force at 30%
vm.dirty_background_ratio = 5
vm.dirty_ratio = 30

# ------------------------------------------------------------------------------
# 2. FILE SYSTEM & INOTIFY LIMITS
# ------------------------------------------------------------------------------
# Increase max open files (Crucial for Nginx, Databases, Docker)
fs.file-max = 2097152
# Increase max inotify watchers (Crucial for Node.js, hot-reloading, containers)
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 8192
# Prevent unprivileged users from creating hard/soft link exploits
fs.protected_hardlinks = 1
fs.protected_symlinks = 1

# ------------------------------------------------------------------------------
# 3. KERNEL SECURITY & BEHAVIOR
# ------------------------------------------------------------------------------
# Disable SysRq key to prevent accidental physical reboots
kernel.sysrq = 0
# Append PID to core dump files
kernel.core_uses_pid = 1
# Enable Address Space Layout Randomization (ASLR)
kernel.randomize_va_space = 2
# Restrict access to kernel pointers (Protects against rootkits)
kernel.kptr_restrict = 1
# Prevent core dumps for setuid processes
fs.suid_dumpable = 0
# Increase IPC message queue limits
kernel.msgmnb = 65536
kernel.msgmax = 65536

# ------------------------------------------------------------------------------
# 4. NETWORK SECURITY & HARDENING (VPN / ROUTER MODE)
# ------------------------------------------------------------------------------
# Defend against SYN flood attacks using SYN cookies
net.ipv4.tcp_syncookies = 1

# Loose Reverse Path Filtering (Allows complex VPN routing while preventing basic spoofing)
net.ipv4.conf.all.rp_filter = 2
net.ipv4.conf.default.rp_filter = 2

# ENABLE IP FORWARDING (Crucial for VPNs and Routers)
net.ipv4.ip_forward = 1
net.ipv4.conf.all.forwarding = 1
net.ipv4.conf.default.forwarding = 1
net.ipv6.conf.all.forwarding = 1
net.ipv6.conf.default.forwarding = 1

# Disable ICMP redirects (Prevents man-in-the-middle routing attacks)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# Disable source routing
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Ignore broadcast ICMP (Smurf attack protection)
net.ipv4.icmp_echo_ignore_broadcasts = 1
# Ignore bogus ICMP errors
net.ipv4.icmp_ignore_bogus_error_responses = 1
# Log martian packets (Packets with impossible addresses)
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1
# Protect against TCP TIME-WAIT assassination (RFC 1337)
net.ipv4.tcp_rfc1337 = 1
# Disable IPv6 Router Advertisements (Unless relying on SLAAC)
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0

# ------------------------------------------------------------------------------
# 5. NETWORK PERFORMANCE & BBR CONGESTION CONTROL
# ------------------------------------------------------------------------------
# Enable TCP BBR Congestion Control & Fair Queueing (Requires kernel module)
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr
# Prevent connection drops by retaining connections longer when slow starting
net.ipv4.tcp_slow_start_after_idle = 0
# Enable TCP Fast Open (Reduces latency for repeated connections)
net.ipv4.tcp_fastopen = 3

# ------------------------------------------------------------------------------
# 6. CONNECTION TRACKING & BACKLOGS (High Traffic Ready)
# ------------------------------------------------------------------------------
# Max concurrent incoming connections on a socket
net.core.somaxconn = 16384
# Max packets buffered when the network interface receives them faster than processed
net.core.netdev_max_backlog = 16384
# Max half-open connections (SYN received, pending ACK)
net.ipv4.tcp_max_syn_backlog = 16384
# How many retries before killing an unacknowledged SYN
net.ipv4.tcp_syn_retries = 2
net.ipv4.tcp_synack_retries = 2

# ------------------------------------------------------------------------------
# 7. TCP TIMEOUTS & KEEPALIVES
# ------------------------------------------------------------------------------
# Safely reuse TIME_WAIT sockets for loopback (Value 2 is safer than 1 on modern kernels)
net.ipv4.tcp_tw_reuse = 2
# Decrease time default to close a FIN state connection (Default is 60s)
net.ipv4.tcp_fin_timeout = 15
# Max number of TIME_WAIT sockets allowed
net.ipv4.tcp_max_tw_buckets = 1440000
# TCP Keepalive Tuning (Detect dead connections faster)
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_probes = 5
net.ipv4.tcp_keepalive_intvl = 15

# ------------------------------------------------------------------------------
# 8. NETWORK BUFFER SIZES (Modernized to 16MB for 1Gbps+ speeds)
# ------------------------------------------------------------------------------
# Ensure window scaling is enabled (Essential for high bandwidth)
net.ipv4.tcp_window_scaling = 1
# Receive Buffer Sizes (Min, Default, Max - Max is 16MB)
net.ipv4.tcp_rmem = 8192 87380 16777216
net.core.rmem_default = 262144
net.core.rmem_max = 16777216
# Send Buffer Sizes (Min, Default, Max - Max is 16MB)
net.ipv4.tcp_wmem = 8192 65536 16777216
net.core.wmem_default = 262144
net.core.wmem_max = 16777216
# Ancillary buffer max size
net.core.optmem_max = 65535

# ------------------------------------------------------------------------------
# 9. FRAGMENTATION & ARP TUNING
# ------------------------------------------------------------------------------
# IP Fragmentation high threshold
#net.ipv4.ipfrag_high_thresh = 262144
#net.ipv6.ip6frag_high_thresh = 262144
# ARP Cache Tuning (Prevents "Neighbor table overflow" on large networks)
net.ipv4.neigh.default.gc_thresh1 = 1024
net.ipv4.neigh.default.gc_thresh2 = 2048
net.ipv4.neigh.default.gc_thresh3 = 4096
